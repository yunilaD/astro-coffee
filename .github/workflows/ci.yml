name: CI

# Trigger: run this pipeline on every push and every pull request to main
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
# 1. Get the code onto the pipeline's temporary machine
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Install a specific Node.js version
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      # 3. Install backend dependencies (needed before we can start the server)
      - name: Install backend dependencies
        run: npm ci
        working-directory: server

      # 4. Check the backend file has no syntax errors
      - name: Check server syntax
        run: node --check server.js
        working-directory: server

      # 5. Start the backend server in the background.
      - name: Start backend server
        run: nohup node server.js > server.log 2>&1 &
        working-directory: server

      # 6. Give the server a moment to actually start listening
      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 10); do
            if curl -s http://localhost:3000/api/menu > /dev/null; then
              echo "Backend is up"
              exit 0
            fi
            sleep 1
          done
          echo "Backend never became reachable"
          exit 1

      # 7. Install frontend dependencies
      - name: Install frontend dependencies
        run: npm ci

      # 8. Build the Astro site — this is the real test that nothing is broken
      - name: Build Astro site
        run: npm run build

  deploy-backend:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Zip backend for deployment
        run: |
          cd server
          zip -r ../server-deploy.zip . -x "node_modules/*" "node_modules" "*.log" "messages.json"

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ secrets.EB_APPLICATION_NAME }}
          environment_name: ${{ secrets.EB_ENVIRONMENT_NAME }}
          version_label: "backend-${{ github.sha }}"
          region: ${{ secrets.AWS_REGION }}
          deployment_package: server-deploy.zip

  deploy-frontend:
    needs: [build, deploy-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Astro site against production backend
        env:
          API_URL: ${{ secrets.PROD_API_URL }}
          PUBLIC_API_URL: ${{ secrets.PROD_API_URL }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync build output to S3
        run: aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }}/dist --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"